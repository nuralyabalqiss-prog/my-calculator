<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fb;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 800px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .control-panel {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (min-width: 600px) {
            .control-panel { grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: span 2; }
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            transition: border 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        .slider-val {
            min-width: 40px;
            font-weight: bold;
            color: #3b82f6;
        }
        .result-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 4px;
            height: 15px;
        }
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Definite Integral Calculator & Visualizer</h2>
    
    <div class="control-panel">
        <div class="input-group full-width">
            <label for="function-input">Function f(x)</label>
            <input type="text" id="function-input" value="x^2 - 1" placeholder="e.g., sin(x), x^2, 2*x + 3">
            <div id="error-box" class="error-message"></div>
        </div>
        
        <div class="input-group">
            <label for="slider-a">Lower Bound (a)</label>
            <div class="slider-container">
                <input type="range" id="slider-a" min="-5" max="5" step="0.1" value="-1">
                <span id="val-a" class="slider-val">-1</span>
            </div>
        </div>

        <div class="input-group">
            <label for="slider-b">Upper Bound (b)</label>
            <div class="slider-container">
                <input type="range" id="slider-b" min="-5" max="5" step="0.1" value="2">
                <span id="val-b" class="slider-val">2</span>
            </div>
        </div>
    </div>

    <div class="result-box">
        <span>∫₀ᵇ f(x) dx = </span>
        <span id="result-value">0.0000</span>
    </div>

    <div class="chart-container">
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<script>
    const functionInput = document.getElementById('function-input');
    const sliderA = document.getElementById('slider-a');
    const sliderB = document.getElementById('slider-b');
    const valA = document.getElementById('val-a');
    const valB = document.getElementById('val-b');
    const resultValue = document.getElementById('result-value');
    const errorBox = document.getElementById('error-box');
    const ctx = document.getElementById('graphCanvas').getContext('2d');

    let chart;

    // Numerical integration using Simpson's Rule
    function integrate(f, a, b, steps = 1000) {
        if (a === b) return 0;
        const h = (b - a) / steps;
        let sum = f(a) + f(b);

        for (let i = 1; i < steps; i++) {
            const x = a + i * h;
            sum += i % 2 === 0 ? 2 * f(x) : 4 * f(x);
        }
        return (h / 3) * sum;
    }

    function updateCalculator() {
        const exprString = functionInput.value;
        let start = parseFloat(sliderA.value);
        let end = parseFloat(sliderB.value);
        
        // Update slider label readouts
        valA.innerText = start;
        valB.innerText = end;

        // Ensure proper left-to-right calculation bounds internally
        const actualStart = Math.min(start, end);
        const actualEnd = Math.max(start, end);

        try {
            errorBox.innerText = ""; // Clear errors
            const compiledExpr = math.compile(exprString);
            const f = (x) => compiledExpr.evaluate({ x: x });

            // Test evaluation to ensure variable x is correct
            f(1);

            // 1. Calculate the Integral
            let integralResult = integrate(f, start, end);
            resultValue.innerText = integralResult.toFixed(4);

            // 2. Generate Chart Data Points
            const xValues = [];
            const yValues = [];
            const shadedValues = [];

            // Fixed view window from -5 to 5
            for (let x = -5; x <= 5; x += 0.1) {
                const roundedX = Math.round(x * 10) / 10;
                const y = f(roundedX);
                
                xValues.push(roundedX);
                yValues.push(y);

                // Populate shading datasets within range [a, b]
                if (roundedX >= actualStart && roundedX <= actualEnd) {
                    shadedValues.push({ x: roundedX, y: y });
                }
            }

            // 3. Render or Update Chart
            if (chart) {
                chart.data.labels = xValues;
                chart.data.datasets[0].data = yValues;
                chart.data.datasets[1].data = shadedValues;
                chart.update('none'); // Update smoothly without rigid resetting
            } else {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: xValues,
                        datasets: [
                            {
                                label: 'f(x)',
                                data: yValues,
                                borderColor: '#1e293b',
                                borderWidth: 2.5,
                                pointRadius: 0,
                                fill: false,
                                tension: 0.1
                            },
                            {
                                label: 'Area Under Curve',
                                data: shadedValues,
                                backgroundColor: 'rgba(59, 130, 246, 0.3)',
                                borderColor: 'transparent',
                                pointRadius: 0,
                                fill: 'origin', // Shards to the x-axis automatically
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                type: 'linear',
                                position: 'bottom',
                                min: -5,
                                max: 5,
                                grid: { color: '#e2e8f0' }
                            },
                            y: {
                                grid: { color: '#e2e8f0' }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
            }

        } catch (err) {
            errorBox.innerText = "Invalid math expression or formatting.";
        }
    }

    // Event Listeners for real-time adjustments
    functionInput.addEventListener('input', updateCalculator);
    sliderA.addEventListener('input', updateCalculator);
    sliderB.addEventListener('input', updateCalculator);

    // Initial Trigger on load
    updateCalculator();
</script>

</body>
</html>
